# Coturn STUN/TURN Server Configuration
# Phase 1: Proof of Concept Configuration

# Listening port for STUN/TURN (default: 3478)
listening-port=3478

# TLS listening port (default: 5349)
tls-listening-port=5349

# Listening IP address (0.0.0.0 = all interfaces)
listening-ip=0.0.0.0

# External IP mapping for cloud NAT environments (public/private).
# Format is public-ip/private-ip and is required on EC2 when instance IP is private.
external-ip=16.112.32.114/172.31.16.173

# Relay sockets should bind to the instance private interface on EC2.
relay-ip=172.31.16.173

# Min and Max ports for relay endpoints
# Using a subset for Phase 1 testing (full range: 49152-65535)
min-port=49152
max-port=65535

# Enable verbose logging (useful for debugging)
verbose

# Realm used for authentication
realm=sfu.local

# Static user credentials (Phase 1)
# Format: username:password
# Change these for production!
user=sfuuser:sfupass123

# Long-term credential mechanism
lt-cred-mech

# Disable short-term credentials for Phase 1
# We'll enable this in Phase 3 for production

# Deny anonymous access
# no-auth

# Enable STUN
# STUN is enabled by default

# Enable TURN
# TURN is enabled by default

# Disable UDP relay endpoints (force TCP)
# Uncomment if you want TCP-only
# no-udp-relay

# Disable TCP relay endpoints (force UDP)
# Uncomment if you want UDP-only
# no-tcp-relay

# SSL/TLS certificate (not needed for Phase 1)
# For Phase 3, uncomment and provide paths:
# cert=/path/to/cert.pem
# pkey=/path/to/key.pem

# Disable TLS and DTLS for Phase 1 (simpler testing)
no-tls
no-dtls

# Deny loopback peers (security)
# Commented out for local testing
# no-loopback-peers

# Deny private IP ranges in relay (security)
# Commented out for local testing
# denied-peer-ip=10.0.0.0-10.255.255.255
# denied-peer-ip=172.16.0.0-172.31.255.255
# denied-peer-ip=192.168.0.0-192.168.255.255

# Log file location
log-file=/var/log/turnserver.log

# Simple log format
simple-log

# Disable log file rotation for Docker (we'll use Docker logs)
no-stdout-log

# Mobility support (ICE mobility)
mobility

# Server fingerprint
fingerprint

# Prometheus metrics (optional, for monitoring)
# prometheus

# Process management
# pidfile=/var/run/turnserver.pid

# Run as daemon
# no-daemon (we want to run in foreground for Docker)
